[project]
name = "agent-local"
version = "0.1.0"
description = "Local/Docker entry point for running agents"
requires-python = ">=3.12"
dependencies = [
    "base-agent",
    "httpx>=0.28.0",
]

[project.scripts]
agent-local = "agent_local.main:main"

[tool.uv.sources]
base-agent = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/agent_local"]
