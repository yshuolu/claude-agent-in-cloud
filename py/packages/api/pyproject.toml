[project]
name = "api"
version = "0.1.0"
description = "REST API for session events and SSE streaming"
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.115.0",
    "sse-starlette>=2.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/api"]
