env_file:
  - ../.env

services:
  server:
    build:
      context: ..
      dockerfile: docker/Dockerfile.server
    ports:
      - "8000:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000}
      - AGENT_RUNNER=${AGENT_RUNNER:-docker}
      - PORT=8000
      - SERVER_URL=http://server:8000
      - FLY_API_TOKEN=${FLY_API_TOKEN:-}
      - FLY_APP_NAME=${FLY_APP_NAME:-}
      - FLY_AGENT_IMAGE=${FLY_AGENT_IMAGE:-}
      - FLY_REGION=${FLY_REGION:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    ports:
      - "3000:3000"
    depends_on:
      - server
    restart: unless-stopped

  agent:
    build:
      context: ..
      dockerfile: docker/Dockerfile.agent
    image: cloud-agent-runner
    # Not started by compose — spawned on demand by the server
    profiles:
      - build-only

  agent-py:
    build:
      context: ..
      dockerfile: docker/Dockerfile.agent-py
    image: cloud-agent-runner-py
    # Not started by compose — spawned on demand by the server
    profiles:
      - build-only
