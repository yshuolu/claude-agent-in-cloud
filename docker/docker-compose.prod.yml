services:
  server:
    env_file:
      - ../.env
    build:
      context: ..
      dockerfile: docker/Dockerfile.server
    ports:
      - "8000:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - CORS_ORIGINS=http://34.135.237.167
      - AGENT_RUNNER=${AGENT_RUNNER:-docker}
      - PORT=8000
      - SERVER_URL=http://server:8000
      - TASK_STORE=${TASK_STORE:-sqlite}
      - LARK_APP_ID=${LARK_APP_ID:-}
      - LARK_APP_SECRET=${LARK_APP_SECRET:-}
      - LARK_USER_TOKEN=${LARK_USER_TOKEN:-}
      - LARK_TASKLIST_GUID=${LARK_TASKLIST_GUID:-}
      - LINEAR_API_KEY=${LINEAR_API_KEY:-}
      - LINEAR_PROJECT_ID=${LINEAR_PROJECT_ID:-}
      - GITHUB_APP_ID=${GITHUB_APP_ID:-}
      - GITHUB_APP_SLUG=${GITHUB_APP_SLUG:-}
      - GITHUB_APP_PRIVATE_KEY=${GITHUB_APP_PRIVATE_KEY:-}
      - FLY_API_TOKEN=${FLY_API_TOKEN:-}
      - FLY_APP_NAME=${FLY_APP_NAME:-}
      - FLY_AGENT_IMAGE=${FLY_AGENT_IMAGE:-}
      - FLY_REGION=${FLY_REGION:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - server-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    ports:
      - "80:3000"
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped

  agent-py:
    build:
      context: ..
      dockerfile: docker/Dockerfile.agent-py
    image: cloud-agent-runner-py
    profiles:
      - build-only

volumes:
  server-data:
